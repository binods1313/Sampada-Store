<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="40" height="40" role="img" aria-label="Cart">
  <defs>
    <linearGradient id="sampadaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B1A1A"/>
    </linearGradient>
  </defs>

  <!-- Cart basket body -->
  <path d="M15 25 L20 25 L28 65 L75 65 L82 35 L28 35"
        fill="none"
        stroke="url(#sampadaGrad)"
        stroke-width="6"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Cart handle curve over top -->
  <path d="M20 25 Q18 15 28 12 Q42 8 40 22"
        fill="none"
        stroke="url(#sampadaGrad)"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- S shape integrated in cart body -->
  <path d="M45 42 Q55 40 54 48 Q53 55 43 55 Q33 55 34 63"
        fill="none"
        stroke="url(#sampadaGrad)"
        stroke-width="5"
        stroke-linecap="round"/>

  <!-- Left wheel -->
  <circle cx="35" cy="74" r="6" fill="url(#sampadaGrad)"/>

  <!-- Right wheel -->
  <circle cx="65" cy="74" r="6" fill="url(#sampadaGrad)"/>
</svg>
