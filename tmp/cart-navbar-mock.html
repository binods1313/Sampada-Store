<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Navbar Cart Icon Mock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0ebe3;
      font-family: Georgia, "Times New Roman", serif;
      padding: 40px 20px;
    }
    .marquee {
      background: #6B1515;
      color: #f5e6c8;
      font-size: 11px;
      text-align: center;
      padding: 8px;
      letter-spacing: 0.3px;
      font-family: system-ui, sans-serif;
    }
    .nav {
      background: #FAF6F0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid #e8e0d4;
    }
    .logo {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 28px;
      color: #8B1A1A;
      font-weight: 600;
    }
    .links {
      display: flex;
      gap: 22px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
    }
    .links span { cursor: default; }
    .links .active { color: #8B1A1A; border-bottom: 2px solid #8B1A1A; padding-bottom: 2px; }
    .actions {
      display: flex;
      align-items: center;
      gap: 16px;
      font-family: system-ui, sans-serif;
    }
    .signin {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: #1a1a1a;
    }
    .icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon img { width: 32px; height: 32px; display: block; }
    .search {
      width: 20px; height: 20px;
      border: 2px solid #333; border-radius: 50%;
      position: relative;
    }
    .search::after {
      content: "";
      position: absolute;
      width: 8px; height: 2px;
      background: #333;
      transform: rotate(45deg);
      right: -5px; bottom: -2px;
    }
    .ham {
      width: 32px; height: 32px;
      border: 1.5px solid #C9A84C;
      border-radius: 6px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    .ham span {
      display: block; width: 14px; height: 1.5px;
      background: #1a1a1a;
    }
    .caption {
      margin-top: 24px;
      text-align: center;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="marquee">Free Shipping ₹999+ · 30-Day Returns · COD Available · ★★★★★ 4.8 from 1,200+ customers</div>
  <div class="nav">
    <div class="logo">Sampada</div>
    <div class="links">
      <span class="active">Home</span>
      <span>Men's Clothing ▾</span>
      <span>Women's Clothing ▾</span>
      <span>His & Hers ▾</span>
      <span>Accessories ▾</span>
      <span>Home & Living ▾</span>
      <span>Sampada Stories</span>
      <span>More :</span>
    </div>
    <div class="actions">
      <div class="signin">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        Sign In
      </div>
      <div class="search"></div>
      <div class="icon" title="Cart">
        <img src="../public/icons/sampada-cart.svg" alt="Cart" width="32" height="32" />
      </div>
      <div class="ham"><span></span><span></span><span></span></div>
    </div>
  </div>
  <p class="caption">Navbar mock — cart icon at 32×32 with gold→crimson gradient</p>
</body>
</html>
