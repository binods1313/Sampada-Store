<!DOCTYPE html>
<html><head><style>
body{margin:0;font-family:system-ui;background:#e8e0d4;padding:40px;display:flex;flex-direction:column;align-items:center;gap:24px}
.nav{background:#FAF6F0;padding:16px 28px;border-radius:8px;display:flex;align-items:center;gap:20px;width:90%;max-width:900px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.logo{font-family:Georgia,serif;font-style:italic;color:#8B1A1A;font-size:24px;flex:1}
.actions{display:flex;align-items:center;gap:14px}
.icon{width:34px;height:34px}
.big{background:#FAF6F0;padding:32px;border-radius:12px}
label{font-size:12px;color:#555}
</style></head><body>
<div class="nav">
  <div class="logo">Sampada</div>
  <div class="actions">
    <span style="font-size:14px">Sign In</span>
    <img class="icon" src="../public/icons/sampada-cart.png" width="34" height="34" alt="cart"/>
    <div style="width:28px;height:28px;border:1.5px solid #C9A84C;border-radius:6px"></div>
  </div>
</div>
<div class="big"><img src="../public/icons/sampada-cart.png" width="128" height="128" alt="128"/><br/><label>128×128 on #FAF6F0</label></div>
<label>34×34 on cream navbar mock</label>
</body></html>
